<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Текстовый квест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1>🗡️ Текстовый квест</h1>
        </div>
        <div id="output">
            <div id="room-description"></div>
            <div id="game-messages"></div>
        </div>
        <div id="input-area">
            <input type="text" id="command-input" placeholder="Введите команду..." autofocus>
            <button id="send-btn">➤</button>
        </div>
        <div id="status">
            <span id="inventory-display">🎒 Инвентарь: пусто</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
